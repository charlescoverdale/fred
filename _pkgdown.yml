url: https://charlescoverdale.github.io/fred/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/charlescoverdale/fred
      aria-label: GitHub

reference:
  - title: "Data Access"
    desc: "Fetch time series observations from FRED"
    contents:
      - fred_series
      - fred_info
      - fred_request

  - title: "Vintage Data (ALFRED)"
    desc: "Real-time and vintage data via ALFRED"
    contents:
      - fred_as_of
      - fred_first_release
      - fred_all_vintages
      - fred_real_time_panel
      - fred_vintages
      - fred_vintage_revisions

  - title: "Discoverability"
    desc: "Find series and browse the FRED structure"
    contents:
      - fred_catalogue
      - fred_browse
      - fred_search
      - fred_recession_dates
      - fred_fomc_dates

  - title: "Categories"
    desc: "Browse the FRED category tree"
    contents:
      - fred_category
      - fred_category_children
      - fred_category_series

  - title: "Releases & Sources"
    desc: "Explore data releases and their sources"
    contents:
      - fred_releases
      - fred_release_series
      - fred_release_dates
      - fred_sources
      - fred_source_releases

  - title: "Tags"
    desc: "Search and explore FRED tags"
    contents:
      - fred_tags
      - fred_related_tags
      - fred_updates

  - title: "Workflow Utilities"
    desc: "Event windows, aggregation, interpolation"
    contents:
      - fred_event_window
      - fred_aggregate
      - fred_interpolate

  - title: "Reproducibility"
    desc: "Citations and manifests for paper-ready workflows"
    contents:
      - fred_cite_series
      - fred_manifest

  - title: "S3 Methods"
    desc: "Methods for fred_tbl and fred_manifest"
    contents:
      - print.fred_tbl
      - summary.fred_tbl
      - plot.fred_tbl
      - "[.fred_tbl"
      - print.fred_manifest

  - title: "Configuration"
    desc: "API key and cache management"
    contents:
      - fred_set_key
      - fred_get_key
      - fred_cache_info
      - clear_cache

  - title: "Package"
    contents:
      - fred-package
